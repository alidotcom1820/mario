<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario - Minimalistische Video Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="intro">
        <div id="intro-text">desjash production</div>
    </div>
    <div id="main">
        <h1>desjash production</h1>
        <input type="file" id="video-upload" accept="video/*">
        <div id="video-container">
            <video id="video" controls style="display:none;"></video>
            <div id="bouncing-text" style="display:none;">designed by mario maserati</div>
            <button id="start-btn" style="display:none;">Start</button>
        </div>
    </div>
    <script src="script.js"></script>
    <!-- Rickroll-Video als verstecktes Element für Prank -->
    <audio id="prank-audio" src="https://www.myinstants.com/media/sounds/rickroll.mp3" preload="auto" style="display:none;"></audio>
</body>
</html>
